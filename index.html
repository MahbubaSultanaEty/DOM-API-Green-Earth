<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- tailwind and daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <main class="container mx-auto text-center">
        <h2 class="text-green-500 font-bold md:text-6xl text-4xl">Choose Your Trees</h2>
        <section class="grid grid-cols-4 gap-8">
            <!-- catagories -->
            <div class="bg-red-400 col-span-1">
                <h2 class="font-bold text-2xl">Catagories</h2>
                <div>
                    <button class="btn btn-success w-full">Primary</button>

                    <!-- catagory buttons -->
                    <div id="catagories-container" class="space-y-3"> 

                    </div>
                </div>
            </div>
            <!-- trees -->
            <div class="bg-blue-400 col-span-2">
                <h2 class="font-bold text-2xl">Trees</h2>
            </div>
            <!-- cart -->
            <div class="bg-green-400 col-span-1">
                <h2 class="font-bold text-2xl">Cart</h2>
            </div>
        </section>
    </main>

    <script src="./script.js"></script>
</body>
</html>
