<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- tailwind and daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <main class="container mx-auto text-center bg-green-50 p-4">
        <h2 class="text-green-500 font-bold md:text-6xl text-4xl mb-4">Choose Your Trees</h2>
        <section class="grid grid-cols-2 sm:grid-cols-3 gap-8">
            <!-- catagories -->
            <div class="bg-green-50 sm:col-span-1 shadow-2xl rounded p-6">
                <h2 class="font-bold text-2xl mb-7">Catagories</h2>
                <div>
                    <!-- catagory buttons -->
                    <div id="catagories-container" class="space-y-3"> 

                    </div>
                </div>
            </div>
            <!-- trees -->
            <div class=" sm:col-span-2">
                <h2 class="font-bold text-2xl">Trees</h2>

                <div id="loadong-spinner" class="h-[60vh] flex justify-center hidden">
                   <span class="loading loading-spinner loading-xl text-green-700"></span>
                </div>

                <!-- trees container -->
                <div id="trees-container" class="grid grid-cols-1  md:grid-cols-2 lg:grid-cols-3 gap-7 p-4 ">
                    <!-- card -->

                </div>
            </div>


            <!-- cart -->
            <div class="bg-green-400 col-span-1">
                <h2 class="font-bold text-2xl">Cart</h2>
            </div>
        </section>
    </main>

    <script src="./script.js"></script>
</body>
</html>
