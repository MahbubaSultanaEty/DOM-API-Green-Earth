<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- tailwind and daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <main class="container mx-auto text-center bg-green-50">
        <h2 class="text-green-500 font-bold md:text-6xl text-4xl mb-4">Choose Your Trees</h2>
        <section class="grid grid-cols-2 sm:grid-cols-3 gap-8">
            <!-- catagories -->
            <div class="bg-green-50 sm:col-span-1 shadow-2xl rounded p-6">
                <h2 class="font-bold text-2xl mb-7">Catagories</h2>
                <div>
                    <!-- catagory buttons -->
                    <div id="catagories-container" class="space-y-3"> 

                    </div>
                </div>
            </div>
            <!-- trees -->
            <div class=" sm:col-span-2">
                <h2 class="font-bold text-2xl">Trees</h2>
                <div id="trees-container" class="grid grid-cols-1  md:grid-cols-2 lg:grid-cols-3 gap-7 p-4 ">
                    <!-- card -->
                    <div class="card bg-base-100 shadow-sm ">
  <figure class="px-4 pt-4 ">
    <img
      src="https://img.daisyui.com/images/stock/photo-1606107557195-0e29a4b5b4aa.webp"
      alt="Shoes"
      class="rounded-xl" />
  </figure>
  <div class="card-body items-center text-left">
    <h2 class="card-title ">Card Title</h2>
    <p class="line-clamp-3">A card component has a figure, a body part, and inside body there are title and actions parts</p>

    <div class="flex items-start w-full mb-4 justify-between ">
      <div class="badge badge-outline bg-green-50 text-green-500">TREE</div>
        <h2 class="font-bold  md:text-xl text-green-400">$500</h2>
   </div>

    <div class="card-actions w-full">
      <button class="btn btn-success rounded-full w-full">Add to Cart</button>
    </div>
  </div>
</div>
                </div>
            </div>


            <!-- cart -->
            <div class="bg-green-400 col-span-1">
                <h2 class="font-bold text-2xl">Cart</h2>
            </div>
        </section>
    </main>

    <script src="./script.js"></script>
</body>
</html>
